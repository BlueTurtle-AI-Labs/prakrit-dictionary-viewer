<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prakrit Dictionary Engine — Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600&family=Georgia&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Prakrit Dictionary Engine<small>Entry &amp; Citation Review</small></h1>
  <button id="openDictBtn">Open Dictionary JSON…</button>
  <button id="saveDictBtn" class="primary" disabled>Save Dictionary</button>
  <input id="jumpBox" list="wordList" placeholder="Jump to word…" autocomplete="off">
  <datalist id="wordList"></datalist>
  <div class="spacer"></div>
  <span id="status"></span>
</header>

<main>
  <div class="pane">
    <div class="pane-head">Entry</div>
    <div id="entryWrap"><div class="placeholder" id="entryPlaceholder">Open a dictionary JSON file to begin</div></div>
  </div>
  <div class="pane">
    <div class="pane-head">
      <span>Source PDF</span>
      <span class="book-tag" id="bookTag"></span>
      <div class="fill"></div>
      <!--
        POC NOTE: bookSelect + the three "Load …" buttons below are a manual
        stand-in for per-book asset loading. In production, the matching PDF /
        tag file / bounding-box CSV should be auto-resolved from `book_name`
        with no dropdown or file picker needed. See the banner comment at the
        top of app.js for details on what to replace.
      -->
      <select id="bookSelect" disabled></select>
      <button id="openPdfBtn" disabled>Load PDF for book…</button>
      <button id="openTagBtn" disabled>Load Tag Data…</button>
      <button id="openBboxBtn" disabled>Load Bounding Boxes…</button>
      <div class="sep"></div>
      <label class="highlight-toggle" title="Draw a box around the selected occurrence's line, and center the view on it">
        <input type="checkbox" id="highlightToggle" checked> Highlight line
      </label>
      <div class="sep"></div>
      <button id="prevPageBtn" disabled>◀</button>
      <div class="pagebox">
        <input id="pageInput" type="number" min="1" value="1" disabled>
        <span>/ <span id="totalPages">–</span></span>
      </div>
      <button id="nextPageBtn" disabled>▶</button>
      <div class="sep"></div>
      <button id="zoomOutBtn" disabled>–</button>
      <span id="zoomLabel">100%</span>
      <button id="zoomInBtn" disabled>+</button>
      <button id="zoomResetBtn" disabled>Fit</button>
    </div>
    <div id="pdfViewport"><div class="placeholder" id="pdfPlaceholder">Load a PDF for a book to view pages here</div></div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
